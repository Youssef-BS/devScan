services:
  postgres:
    image: postgres:15-alpine
    container_name: devscan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devscan
      POSTGRES_PASSWORD: devscan
      POSTGRES_DB: devscan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devscan -d devscan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devscan_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: devscan_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.api
    container_name: devscan_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://devscan:devscan@postgres:5432/devscan_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AI_SERVICE_URL: http://ai:8003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.client
    container_name: devscan_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./apps/client/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.admin
    container_name: devscan_admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./apps/admin/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

  ai:
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.ai
    container_name: devscan_ai
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - ./apps/ai/.env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  ollama_data:
