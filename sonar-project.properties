sonar.projectKey=devscan
sonar.projectName=DevScan
sonar.projectVersion=1.0

sonar.sources=apps/api/src,apps/client/src

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/prisma/migrations/**,\
  **/*.d.ts

sonar.typescript.tsconfigPath=apps/api/tsconfig.json,apps/client/tsconfig.json

sonar.sourceEncoding=UTF-8
